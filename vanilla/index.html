<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamentos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Agendamentos</h1>
      <button type="button" id="btn-open-modal" class="btn-primary">Agendar</button>
    </header>

    <section class="appointments-list" aria-label="Lista de agendamentos">
      <article class="appointment-card">
        <h2 class="client-name">Ana Silva</h2>
        <p class="service">Consulta inicial</p>
        <p class="datetime">
          <time datetime="2026-07-08T14:30">08/07/2026 às 14:30</time>
        </p>
      </article>

      <article class="appointment-card">
        <h2 class="client-name">Bruno Costa</h2>
        <p class="service">Retorno</p>
        <p class="datetime">
          <time datetime="2026-07-09T10:00">09/07/2026 às 10:00</time>
        </p>
      </article>

      <article class="appointment-card">
        <h2 class="client-name">Carla Mendes</h2>
        <p class="service">Avaliação</p>
        <p class="datetime">
          <time datetime="2026-07-10T16:00">10/07/2026 às 16:00</time>
        </p>
      </article>
    </section>
  </main>

  <dialog id="appointment-modal" class="modal">
    <form method="dialog" class="modal-content">
      <header class="modal-header">
        <h2>Novo agendamento</h2>
        <button type="button" id="btn-close-modal" class="btn-close" aria-label="Fechar">&times;</button>
      </header>

      <div class="form-group">
        <label for="client-name">Nome do cliente</label>
        <input type="text" id="client-name" name="clientName" required>
      </div>

      <div class="form-group">
        <label for="service">Serviço</label>
        <input type="text" id="service" name="service" required>
      </div>

      <div class="form-group">
        <label for="date">Data</label>
        <input type="date" id="date" name="date" required>
      </div>

      <div class="form-group">
        <label for="time">Horário</label>
        <input type="time" id="time" name="time" required>
      </div>

      <div class="form-group">
        <label for="notes">Observações</label>
        <textarea id="notes" name="notes" rows="3"></textarea>
      </div>

      <footer class="modal-footer">
        <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary">Salvar</button>
      </footer>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
